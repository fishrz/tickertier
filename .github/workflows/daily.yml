name: Daily Pipeline & JSON Export

on:
  schedule:
    # Daily at 22:00 UTC — after US market close + data settle (ET 17:00/18:00 DST)
    - cron: '0 22 * * *'  # 22:00 UTC daily — after US market close + data settle
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yfinance duckdb pandas pyarrow finnhub-python pandas-market-calendars scikit-learn Pillow
          sudo apt-get update -y && sudo apt-get install -y --no-install-recommends fonts-wqy-zenhei fonts-dejavu-core

      - name: Run daily pipeline
        run: python scripts/run_daily.py

      - name: Export JSON snapshots
        run: python scripts/export_json.py

      - name: Generate daily card
        run: python scripts/generate_daily_card.py

      # NOTE: Telegram push is intentionally disabled on the public mirror —
      # the private repo runs the same pipeline and owns notification delivery
      # to avoid duplicate messages. Do NOT add the TELEGRAM_BOT_TOKEN secret
      # back to this repo unless you've also disabled the private repo's push.

      - name: Commit JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/*.json web/public/data/cards/*.png
          if git diff --cached --quiet; then
            echo "No JSON / card changes to commit"
          else
            git commit -m "chore: update data snapshots $(date -u +%Y-%m-%d)"
            git push
          fi
