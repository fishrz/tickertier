name: Daily Pipeline & JSON Export

on:
  schedule:
    # Weekdays at 10:45 UTC (6:45 AM ET)
    - cron: '45 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance duckdb pandas pyarrow finnhub-python pandas-market-calendars scikit-learn

      - name: Fetch prices (incremental)
        run: python -m data.pipelines.fetch_prices --incremental

      - name: Compute daily awards
        run: python -m data.pipelines.compute_awards --daily

      - name: Export JSON snapshots
        run: python scripts/export_json.py

      - name: Commit JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/*.json
          if git diff --cached --quiet; then
            echo "No JSON changes to commit"
          else
            git commit -m "chore: update data snapshots $(date -u +%Y-%m-%d)"
            git push
          fi
